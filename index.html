<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Verificación de Seguridad</title>
<style>
  /* ============================================
     SECURITY AWARENESS TRAINING TERMINAL
     Inspirado en: Dyspian/SecurityToolSimulation
     y Vinesh0409/Fake-hacking-Terminal
     Optimizado para móvil · GitHub Pages ready
  ============================================ */
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-dark: #003b00;
    --red: #ff3131;
    --amber: #ffb300;
    --blue: #00cfff;
    --white: #e0ffe0;
    --bg: #000000;
    --bg2: #050f05;
    --font-mono: 'Share Tech Mono', 'Courier New', monospace;
    --font-vt: 'VT323', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  /* === MATRIX RAIN CANVAS === */
  #matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  /* === CRT SCANLINE OVERLAY === */
  .crt-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* === MAIN TERMINAL WRAPPER === */
  #terminal-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* === TOP STATUS BAR === */
  #statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: #000;
    border-bottom: 1px solid var(--green-dark);
    font-size: 11px;
    color: var(--green-dim);
    flex-shrink: 0;
  }
  #statusbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; margin-right: 5px; animation: blink-dot 1.2s infinite; }
  #statusbar .conn { color: var(--red); font-size: 11px; }
  #statusbar .time-display { color: var(--green-dim); font-size: 10px; }
  @keyframes blink-dot { 0%,100%{ opacity:1 } 50%{ opacity:0.2 } }

  /* === URL BAR (fake browser) === */
  #urlbar {
    background: #0a0a0a;
    border-bottom: 1px solid #1a2a1a;
    padding: 7px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #urlbar .lock { font-size: 12px; }
  #urlbar .url-text {
    font-size: 11px;
    color: #4a8a4a;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex: 1;
  }
  #urlbar .spinner {
    width: 12px; height: 12px;
    border: 2px solid #1a2a1a;
    border-top-color: var(--green-dim);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === TERMINAL BODY === */
  #terminal {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 10px 12px 80px;
    scroll-behavior: smooth;
  }
  #terminal::-webkit-scrollbar { width: 3px; }
  #terminal::-webkit-scrollbar-track { background: #000; }
  #terminal::-webkit-scrollbar-thumb { background: var(--green-dark); }

  /* === TERMINAL LINES === */
  .t-line {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 3px;
    font-size: 13px;
    line-height: 1.5;
    animation: appear 0.08s ease forwards;
    opacity: 0;
  }
  @keyframes appear { to { opacity: 1; } }

  .t-prefix { flex-shrink: 0; font-weight: bold; font-size: 12px; min-width: 28px; }
  .t-text { word-break: break-all; }

  /* Color classes */
  .c-green  { color: var(--green); }
  .c-dim    { color: var(--green-dim); }
  .c-red    { color: var(--red); }
  .c-amber  { color: var(--amber); }
  .c-blue   { color: var(--blue); }
  .c-white  { color: var(--white); }
  .c-data   { color: #ff8800; }

  /* === PROGRESS BAR === */
  .progress-wrap {
    margin: 4px 0 6px;
    animation: appear 0.08s ease forwards;
    opacity: 0;
  }
  .progress-label { font-size: 11px; color: var(--green-dim); margin-bottom: 3px; }
  .progress-track {
    width: 100%;
    height: 6px;
    background: #0a1a0a;
    border: 1px solid #1a3a1a;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.05s linear;
    box-shadow: 0 0 6px var(--green);
  }

  /* === BLINKING CURSOR === */
  #cursor {
    display: inline-block;
    width: 9px; height: 15px;
    background: var(--green);
    vertical-align: middle;
    animation: blink 0.8s step-start infinite;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }

  /* === SEPARATOR LINE === */
  .sep-line {
    border: none;
    border-top: 1px solid #0f2a0f;
    margin: 8px 0;
    animation: appear 0.08s ease forwards;
    opacity: 0;
  }

  /* === REVEAL BOX (capacitación) === */
  #reveal {
    display: none;
    margin: 12px 0 30px;
    border: 2px solid var(--amber);
    border-radius: 6px;
    overflow: hidden;
    animation: reveal-in 0.4s ease forwards;
  }
  @keyframes reveal-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #reveal .r-header {
    background: #1a1000;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #reveal .r-badge {
    background: var(--amber);
    color: #000;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  #reveal .r-title {
    color: var(--amber);
    font-size: 14px;
    font-weight: bold;
  }
  #reveal .r-body {
    background: #0a0800;
    padding: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: #ccaa44;
  }
  #reveal .r-body .r-item {
    display: flex;
    gap: 8px;
    margin-bottom: 5px;
  }
  #reveal .r-body .r-arrow { color: var(--red); flex-shrink: 0; }
  #reveal .r-body .r-safe {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #2a1a00;
    color: var(--green-dim);
    font-size: 12px;
  }
  #reveal .r-footer {
    background: #050500;
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  #reveal .r-btn {
    flex: 1;
    min-width: 120px;
    padding: 10px;
    border: 1px solid var(--amber);
    background: #1a1000;
    color: var(--amber);
    font-family: var(--font-mono);
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s;
  }
  #reveal .r-btn:hover, #reveal .r-btn:active { background: #2a2000; }

  /* === SCAN COMPLETE BOX === */
  #scan-complete {
    display: none;
    margin: 8px 0;
    padding: 8px 12px;
    background: #001a00;
    border-left: 3px solid var(--green);
    font-size: 12px;
    color: var(--green-dim);
    animation: appear 0.15s ease forwards;
    opacity: 0;
  }

  /* === FLOATING IP TAG === */
  #ip-badge {
    position: fixed;
    top: 75px;
    right: 10px;
    background: #001a00;
    border: 1px solid var(--green-dark);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px;
    color: var(--green-dim);
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* === BOTTOM STATUS === */
  #bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #000;
    border-top: 1px solid var(--green-dark);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    font-size: 10px;
    color: var(--green-dark);
  }
  #bottom-bar .bstat { color: var(--green-dim); }
  #progress-pct { color: var(--green); font-weight: bold; }

  /* Mobile landscape adjustments */
  @media (max-height: 500px) {
    .t-line { font-size: 11px; margin-bottom: 2px; }
    #terminal { padding: 8px 10px 70px; }
  }
</style>
</head>
<body>

<!-- Matrix rain background -->
<canvas id="matrix-canvas"></canvas>
<div class="crt-overlay"></div>

<!-- Floating IP badge -->
<div id="ip-badge">IP: <span id="ip-val">...</span></div>

<div id="terminal-wrap">

  <!-- Fake browser top bar -->
  <div id="statusbar">
    <div>
      <span class="dot"></span>
      <span class="conn">CONEXION ACTIVA</span>
    </div>
    <div class="time-display" id="clock">00:00:00</div>
  </div>

  <div id="urlbar">
    <span class="lock">🔒</span>

</div>

<!-- Bottom status bar -->
<div id="bottom-bar">
  <span>SYS://ANALYSIS</span>
  <span id="progress-pct" class="bstat">0%</span>
  <span class="bstat" id="bottom-status">INICIANDO...</span>
</div>

<script>
// =============================================
//  SECURITY AWARENESS TRAINING TERMINAL
//  Solo Visual — No extrae datos reales
// =============================================

// === CONFIG: Personaliza aqui tu campaña ===
const CONFIG = {
  companyName: "TU EMPRESA",
  campaignName: "Verificación de Cuenta",
  adminEmail: "",         // opcional: tu email para tracking real (ver README)
  webhookUrl: "https://discord.com/api/webhooks/1498895946526752850/osea04DvrjvxFAjkG5uMZHvqF24DytORvw9jYIUE7F75cY7J61zYM_dgxSpVvZumRnPI",         // opcional: Discord/Slack webhook URL
  showRevealAfterMs: 500, // ms de pausa antes del reveal
  urlDisplay: "secure-verify.empresa.com/check?token=aX9k2mP"
};

// === CLOCK ===
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000);
updateClock();

document.getElementById('url-display').textContent = CONFIG.urlDisplay;

// === MATRIX RAIN ===
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
let drops = [];

function initMatrix() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 16);
  drops = Array(cols).fill(1);
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px Share Tech Mono';
  drops.forEach((y, i) => {
    const char = String.fromCharCode(0x30A0 + Math.random() * 96);
    ctx.fillText(char, i * 16, y * 16);
    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}

initMatrix();
setInterval(drawMatrix, 55);
window.addEventListener('resize', initMatrix);

// === TERMINAL ENGINE ===
const term = document.getElementById('terminal');
const cursorEl = document.getElementById('cursor');
let totalSteps = 0;
let doneSteps = 0;

function el(tag, cls, text) {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  if (text !== undefined) d.textContent = text;
  return d;
}

function addLine(prefix, prefixColor, text, textColor, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const line = el('div', 't-line');
      const p = el('span', `t-prefix ${prefixColor}`, prefix);
      const t = el('span', `t-text ${textColor}`, text);
      line.appendChild(p);
      line.appendChild(t);
      term.insertBefore(line, document.getElementById('cursor-line'));
      term.scrollTop = term.scrollHeight;
      doneSteps++;
      updateProgress();
      resolve();
    }, delay);
  });
}

function addSep(delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const hr = el('hr', 'sep-line');
      term.insertBefore(hr, document.getElementById('cursor-line'));
      resolve();
    }, delay);
  });
}

function addProgress(label, duration, delay) {
  return new Promise(resolve => {
    setTimeout(() => {
      const wrap = el('div', 'progress-wrap');
      const lbl = el('div', 'progress-label c-dim', label);
      const track = el('div', 'progress-track');
      const fill = el('div', 'progress-fill');
      track.appendChild(fill);
      wrap.appendChild(lbl);
      wrap.appendChild(track);
      term.insertBefore(wrap, document.getElementById('cursor-line'));
      term.scrollTop = term.scrollHeight;
      let pct = 0;
      const step = duration / 100;
      const iv = setInterval(() => {
        pct = Math.min(pct + Math.random() * 4 + 1, 100);
        fill.style.width = pct + '%';
        if (pct >= 100) { clearInterval(iv); resolve(); }
      }, step);
    }, delay);
  });
}

function updateProgress() {
  const pct = Math.min(Math.round((doneSteps / totalSteps) * 100), 99);
  document.getElementById('progress-pct').textContent = pct + '%';
}

// === GET REAL PUBLIC IP (solo lectura pública, como hace cualquier web) ===
let visitorIP = '???';
let visitorCity = '???';
let visitorCountry = '??';
let visitorOrg = 'DESCONOCIDO';

async function fetchIP() {
  try {
    const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
    const d = await r.json();
    visitorIP      = d.ip        || '???';
    visitorCity    = d.city      || '???';
    visitorCountry = d.country   || '??';
    visitorOrg     = d.org       || 'ISP DESCONOCIDO';
  } catch (_) { /* continúa con valores por defecto */ }
}

// === DEVICE INFO ===
function getDeviceInfo() {
  const ua = navigator.userAgent;
  let os = 'Desconocido';
  let browser = 'Desconocido';
  let device = 'Desktop';

  if (/Android/i.test(ua))      { os = 'Android'; device = 'Móvil'; }
  else if (/iPhone|iPad/i.test(ua)) { os = 'iOS'; device = /iPad/.test(ua) ? 'Tablet' : 'Móvil'; }
  else if (/Windows/i.test(ua)) { os = 'Windows'; }
  else if (/Mac/i.test(ua))     { os = 'macOS'; }
  else if (/Linux/i.test(ua))   { os = 'Linux'; }

  if (/Chrome\/[\d.]+/.test(ua) && !/Edge|OPR/.test(ua)) browser = 'Chrome';
  else if (/Firefox/i.test(ua))  browser = 'Firefox';
  else if (/Safari/i.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if (/Edge/i.test(ua))     browser = 'Edge';
  else if (/OPR|Opera/i.test(ua)) browser = 'Opera';

  const lang = navigator.language || 'es';
  const screen = `${window.screen.width}x${window.screen.height}`;
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Desconocido';
  const cpu = navigator.hardwareConcurrency ? navigator.hardwareConcurrency + ' núcleos' : '?';
  const mem = navigator.deviceMemory ? navigator.deviceMemory + ' GB RAM' : '?';

  return { os, browser, device, lang, screen, tz, cpu, mem };
}

// Genera fingerprint simulado (no real tracking)
function fakeFingerprint() {
  const chars = '0123456789abcdef';
  return Array.from({length: 32}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

// === WEBHOOK NOTIFY (opcional) ===
async function notifyWebhook(data) {
  if (!CONFIG.webhookUrl) return;
  try {
    await fetch(CONFIG.webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content: null,
        embeds: [{
          title: '🎣 Clic en URL de capacitación',
          color: 0xff3131,
          fields: [
            { name: 'IP', value: data.ip, inline: true },
            { name: 'Ciudad', value: data.city + ', ' + data.country, inline: true },
            { name: 'Dispositivo', value: data.device + ' / ' + data.os, inline: true },
            { name: 'Navegador', value: data.browser, inline: true },
            { name: 'Hora', value: new Date().toISOString(), inline: true },
          ]
        }]
      })
    });
  } catch (_) {}
}

// === MAIN SIMULATION ===
async function runSimulation() {
  // Fetch IP en paralelo mientras se muestra la animación inicial
  const ipPromise = fetchIP();
  const dev = getDeviceInfo();
  const fp = fakeFingerprint();
  const ts = new Date().toISOString();

  // Contar pasos para la barra de progreso
  totalSteps = 38;

  let t = 200;
  const gap = (ms) => { t += ms; return t; };

  await addLine('[SYS]', 'c-dim', 'Iniciando módulo de verificación de seguridad...', 'c-dim', gap(0));
  await addLine('[SYS]', 'c-dim', 'Versión del protocolo: TLS 1.3  Cifrado: AES-256-GCM', 'c-dim', gap(300));
  await addSep(gap(100));

  // Detectar dispositivo
  await addLine('[INF]', 'c-blue', 'Analizando entorno del cliente...', 'c-blue', gap(200));
  await addLine('[>>]', 'c-dim', `Sistema operativo  : ${dev.os}`, 'c-white', gap(350));
  await addLine('[>>]', 'c-dim', `Tipo de dispositivo: ${dev.device}`, 'c-white', gap(250));
  await addLine('[>>]', 'c-dim', `Navegador          : ${dev.browser}`, 'c-white', gap(250));
  await addLine('[>>]', 'c-dim', `Resolución         : ${dev.screen}`, 'c-white', gap(200));
  await addLine('[>>]', 'c-dim', `Idioma             : ${dev.lang}`, 'c-white', gap(200));
  await addLine('[>>]', 'c-dim', `Zona horaria       : ${dev.tz}`, 'c-white', gap(200));
  await addLine('[>>]', 'c-dim', `CPU / RAM          : ${dev.cpu} / ${dev.mem}`, 'c-white', gap(200));
  await addProgress('Analizando fingerprint del dispositivo...', 900, gap(200));
  await addLine('[OK]', 'c-green', `Fingerprint: ${fp.slice(0,16)}...${fp.slice(-6)}`, 'c-green', gap(150));
  await addSep(gap(100));

  // Esperar IP
  await ipPromise;
  document.getElementById('ip-val').textContent = visitorIP;
  document.getElementById('ip-badge').style.opacity = '1';

  // IP y geolocalización
  await addLine('[WRN]', 'c-amber', 'Obteniendo información de red...', 'c-amber', gap(200));
  await addLine('[>>]', 'c-dim', `IP pública         : ${visitorIP}`, 'c-data', gap(350));
  await addLine('[>>]', 'c-dim', `Ciudad / País      : ${visitorCity}, ${visitorCountry}`, 'c-data', gap(300));
  await addLine('[>>]', 'c-dim', `Proveedor (ISP)    : ${visitorOrg}`, 'c-data', gap(250));
  await addProgress('Trazando ruta de red (traceroute simulado)...', 1100, gap(200));
  await addLine('[OK]', 'c-green', '14 saltos detectados · Ruta mapeada', 'c-green', gap(150));
  await addSep(gap(100));

  // Cookies y sesión
  await addLine('[WRN]', 'c-amber', 'Inspeccionando cookies y almacenamiento local...', 'c-amber', gap(200));
  await addLine('[>>]', 'c-dim', `Cookies habilitadas: ${navigator.cookieEnabled ? 'SÍ' : 'NO'}`, 'c-white', gap(300));
  await addLine('[>>]', 'c-dim', `Storage disponible : localStorage + sessionStorage`, 'c-white', gap(250));
  await addProgress('Escaneando datos del navegador...', 1000, gap(150));
  await addLine('[ERR]', 'c-red', 'ADVERTENCIA: Datos de sesión expuestos', 'c-red', gap(150));
  await addSep(gap(100));

  // Reporte final
  await addLine('[SYS]', 'c-dim', 'Generando reporte de exposición...', 'c-dim', gap(200));
  await addProgress('Enviando datos al servidor de análisis...', 700, gap(200));

  // Notify webhook con datos reales
  notifyWebhook({ ip: visitorIP, city: visitorCity, country: visitorCountry, device: dev.device, os: dev.os, browser: dev.browser, ts });

  await addLine('[OK]', 'c-green', `Reporte generado · ID: SIM-${ts.slice(0,10)}-${Math.random().toString(36).slice(2,8).toUpperCase()}`, 'c-green', gap(200));
  await addLine('[SYS]', 'c-dim', `Timestamp: ${ts}`, 'c-dim', gap(200));

  // Actualizar UI
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('bottom-status').textContent = 'SCAN COMPLETO';
  document.getElementById('url-spinner').style.display = 'none';

  // Mostrar reveal
  setTimeout(() => showReveal(dev, fp), CONFIG.showRevealAfterMs + 600);
}

// === REVEAL BOX ===
function showReveal(dev, fp) {
  const reveal = document.createElement('div');
  reveal.id = 'reveal';
  reveal.innerHTML = `
    <div class="r-header">
      <span class="r-badge">CAPACITACIÓN EN SEGURIDAD</span>
    </div>
    <div style="padding: 12px 14px; background: #0f1a00; border-bottom: 1px solid #1a2a00;">
      <div style="color: var(--amber); font-size: 15px; font-weight: bold; margin-bottom: 6px;">
        ¡Hiciste clic en una URL de prueba!
      </div>
      <div style="color: #999; font-size: 12px; line-height: 1.6;">
        Esta fue una simulación controlada de <strong style="color: var(--green-dim);">${CONFIG.companyName}</strong>.<br>
        No se extrajo ningún dato sensible. Sin embargo, en un ataque real,<br>
        un sitio malicioso podría haber recopilado:
      </div>
    </div>
    <div class="r-body">
      <div class="r-item"><span class="r-arrow">→</span><span>Tu IP pública y ubicación aproximada: <strong style="color:var(--red)">${visitorCity}, ${visitorCountry} (${visitorIP})</strong></span></div>
      <div class="r-item"><span class="r-arrow">→</span><span>Dispositivo y sistema operativo: <strong style="color:var(--red)">${dev.device} / ${dev.os}</strong></span></div>
      <div class="r-item"><span class="r-arrow">→</span><span>Navegador e idioma: <strong style="color:var(--red)">${dev.browser} / ${dev.lang}</strong></span></div>
      <div class="r-item"><span class="r-arrow">→</span><span>Un fingerprint único de tu dispositivo</span></div>
      <div class="r-item"><span class="r-arrow">→</span><span>Redirigirte a formularios de robo de credenciales</span></div>
      <div class="r-safe">
        <strong>¿Qué debes hacer?</strong><br>
        Verifica siempre el dominio antes de hacer clic · Ante la duda, consulta a TI · Nunca ingreses credenciales en URLs recibidas por correo
      </div>
    </div>
    <div class="r-footer">
      <button class="r-btn" onclick="window.location.reload()">Reiniciar simulación</button>
      <button class="r-btn" onclick="this.textContent='¡Entendido!'">Confirmar que entendí</button>
    </div>
  `;

  term.insertBefore(reveal, document.getElementById('cursor-line'));
  reveal.style.display = 'block';
  term.scrollTop = term.scrollHeight;
}

// === START ===
runSimulation();
</script>
</body>
